[project]
name = "storyteller-hardware"
version = "0.1.0"
description = "StoryTeller hardware: audio backends, LED ring, ReSpeaker, net onboarding, voice menu"
requires-python = ">=3.13"
dependencies = [
    "storyteller-core",
    "storyteller-voice",
    "numpy>=1.26",
    "sounddevice>=0.4.6",
    "soundfile>=0.12",
    "pyusb>=1.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/storyteller_hardware"]

[tool.uv.sources]
storyteller-core = { workspace = true }
storyteller-voice = { workspace = true }
