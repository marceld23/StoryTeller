[project]
name = "storyteller-core"
version = "0.1.0"
description = "StoryTeller core: story engine (LangGraph), worlds, config, persistence"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.7",
    "python-dotenv>=1.0",
    "openai>=1.40",
    "rich>=13.7",
    "langgraph>=0.2.55",
    "langgraph-checkpoint-sqlite>=2.0",
    "numpy>=1.26",
]

[project.optional-dependencies]
rag = ["sqlite-vec>=0.1.6"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/storyteller_core"]
