[project]
name = "storyteller-voice"
version = "0.1.0"
description = "StoryTeller voice: STT/TTS abstractions, audio FX"
requires-python = ">=3.13"
dependencies = [
    "storyteller-core",
    "openai>=1.40",
    "numpy>=1.26",
    "soundfile>=0.12",
    "sounddevice>=0.4.6",
    "wyoming>=1.5",
]

[project.optional-dependencies]
audiofx = ["pedalboard>=0.9.14"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/storyteller_voice"]

[tool.uv.sources]
storyteller-core = { workspace = true }
