# Storyteller — central configuration. All model names are changeable here.

[general]
locale = "de"        # de | en  (language for prompts/menu/STT/TTS)

[runtime]
profile = "auto"     # auto | pi | pc
# auto: Linux + ReSpeaker detected => pi (ALSA softvol, LED ring),
#       otherwise => pc (portable sounddevice backend, no LED needed).

[models]
story_llm        = "gpt-5.4"                 # NARRATOR — a strong model pays off here
planner_llm      = "gpt-5.4"                 # architect + summarizer; empty => story_llm (pick a cheaper one to free up story_llm)
gen_llm          = "gpt-5.4"                 # WORLD/CONTENT GENERATION (once per world/suggestion) — default the big model; empty => story_llm
gate_llm         = ""                        # NARRATION GATE (curator; runs every turn) — empty => same as planner_llm. Keep this small/fast.
stt              = "gpt-4o-mini-transcribe"  # speech recognition (OpenAI)
tts              = "gpt-4o-mini-tts"         # speech output (OpenAI; Whisper can NOT do TTS)
tts_voice        = "ballad"
embedding        = "text-embedding-3-small"  # RAG embeddings
embedding_dim    = 512                       # Matryoshka truncation (smaller = cheaper)
llm_temperature     = 0.9   # narrator temperature
planner_temperature = 0.6   # architect + summarizer
gen_temperature     = 0.8   # world/content generation
gate_temperature    = 0.3   # narration-gate / curator (kept low for determinism)
frequency_penalty = 0.0   # anti-repetition for the narrator; 0=off, gentle 0.2–0.4 recommended
presence_penalty  = 0.0   # same (topic variety); 0=off

# Custom OpenAI-compatible endpoints per purpose (empty = OpenAI). base_url
# incl. host:port and /v1, e.g. http://192.168.1.50:8000/v1 (vLLM/llama.cpp/
# Ollama/LM Studio). api_key is sent as Bearer (local servers often accept
# anything). Moderation always uses the OpenAI default. Example:
#   [models.story_endpoint]
#   base_url = "http://192.168.1.50:8000/v1"
#   api_key  = "sk-local"
# Others: planner_endpoint, gen_endpoint, gate_endpoint, stt_endpoint,
# tts_endpoint, embedding_endpoint — same shape. Empty `gate_endpoint`
# (default) reuses the planner endpoint, which in turn falls back to the
# story endpoint — so a local LLM setup only needs to set the endpoints
# you actually use.

[stt]
provider = "openai"   # openai | local_whisper  (local => Phase 10, Pi 5 + AI HAT only)
language = "de"

[capture]
# Voice recording ends on a speech pause instead of after a fixed time —
# the player may talk as long as they want (up to max_seconds).
max_seconds     = 30.0   # hard upper bound (cost / runaway protection)
silence_seconds = 2.0    # pause that ends the turn (longer = more think-mid-sentence)
start_timeout_s = 10.0   # nothing said at all -> abort, ask again
min_seconds     = 0.5    # never end before this (ignore the first breath)

[tts]
# Provider is also auto-detected from the tts endpoint URL scheme — leave
# this on the default and just point models.tts_endpoint at the right URL:
#   http(s)://…/v1      → openai-compatible (OpenAI, kokoro, …)
#   tcp:// / wyoming:// → Wyoming/Piper
#   xtts://             → daswer123/xtts-api-server
provider    = "openai"  # openai | xtts | wyoming | local  (local => Phase 10)
format      = "pcm"     # 24 kHz mono s16le — ideal for reverb
sample_rate = 24000

[audio]
backend            = "auto"                  # auto | alsa_softvol | portable | pipewire
output_alsa_pcm    = "plug:respeaker_softvol" # aplay/speaker-test target (softvol => volume)
input_alsa_pcm     = "respeaker_capture"      # arecord source (ReSpeaker, 16 kHz mono)
sd_output_device   = ""                       # sounddevice device; empty => ALSA default (~/.asoundrc => softvol)
mixer_card         = "ArrayUAC10"             # ALSA card name of the ReSpeaker
mixer_control      = "Master"                 # softvol control
default_volume_pct = 15   # ReSpeaker line-out is very "hot"; raise if needed (amixer -c ArrayUAC10 sset Master 25%)
input_sample_rate  = 16000
pw_sink            = ""   # Phase 8: PipeWire sink (empty = default sink, e.g. Bluetooth)

[wakeword]
engine    = "openwakeword"
model     = ""        # built-in name (e.g. "alexa") OR path to a custom .onnx
model_de  = ""        # optional: custom wake word for locale de (path/.onnx)
model_en  = ""        # optional: custom wake word for locale en
threshold = 0.5       # higher = fewer false triggers
follow_up = true      # after speaking, listen once more without the wake word

[hardware]
# GPIO push-buttons (each role has its own group, both off by default).
# Wiring: button between the BCM pin and any GND. See docs/SETUP_PI.md.
# Enable on the Pi: uv pip install gpiozero lgpio  (apt: swig python3-dev liblgpio-dev)

# Interrupt button:
#   short press -> pause/resume the current narration (SIGSTOP/SIGCONT on aplay)
#   long press  -> abort narration and open the spoken system menu
interrupt_button_enabled       = false  # master switch — leave false if no button is wired
interrupt_button_pin           = 17     # BCM pin (default 17 = physical pin 11)
interrupt_button_pull_up       = true   # internal pull-up: button connects pin -> GND
interrupt_button_bounce_s      = 0.08   # debounce time in seconds
interrupt_button_long_press_s  = 2.0    # hold this long to count as "long press"

# Shutdown button:
#   short press -> announce "Spielstand gespeichert" (state is auto-checkpointed)
#   long press  -> say goodbye, then `sudo -n systemctl poweroff`
#                  (requires NOPASSWD sudo for that command — see SETUP_PI.md)
shutdown_button_enabled        = false
shutdown_button_pin            = 27     # BCM pin (default 27 = physical pin 13)
shutdown_button_pull_up        = true
shutdown_button_bounce_s       = 0.08
shutdown_button_long_press_s   = 2.0

[fx]
enabled              = true
# Subtle reverb (pedalboard Reverb). Overridable per world (world.fx_preset).
reverb_room_size     = 0.55
reverb_damping       = 0.55
reverb_wet_level     = 0.18
reverb_dry_level     = 0.85
distortion_drive_db  = 0.0   # 0 = off; light distortion ~4–8

[story]
short_term_memory_turns   = 12   # smaller (e.g. 8) trims the narrator prompt and noticeably speeds up local LLMs
rag_top_k                 = 4    # fewer facts -> less detail flood
cost_cap_usd_per_session  = 2.0
max_substory_beats        = 5    # length of the mini tension arc per substory
default_complexity        = "standard"  # simple|standard|rich (overridable per world)
dynamic_event_prob        = 0.15 # probability per turn for an abstract story dynamic (subtle)
dynamics_in_planning      = true # architect may (subtly) plan abstract twists
long_term_memory          = true # long-term memory: condense turns falling out of the window into a rolling synopsis
synopsis_max_chars        = 900  # max length of the synopsis (keep it tight)
synopsis_batch            = 8    # this many old messages condensed at once (rare => cheap)
beat_nudge_after          = 3    # after this many turns on the same sub-beat, gently remind advance_beat (0=off)
known_facts_cap           = 30   # cap on player facts (oldest without a note is evicted)
# Narration "gate" (curator): runs gate_llm each turn to decide which
# authored reveals (fragments / history / substory resolution) the narrator
# MAY weave in this turn and which authored topics must stay hidden today.
# Player improvisation and spontaneous new facts are NOT gated. Disable to
# fall back to the algorithmic-only spoiler guards (next-beat and
# resolution_hint are hidden unconditionally regardless of this toggle).
narration_gate_enabled      = true
narration_gate_max_reveals  = 3    # cap on authored reveals per turn
# Narration-style guideline (freely editable): controls simplicity/length.
narration_guidance = "Erzähle EINFACH und KLAR fürs Zuhören: höchstens 4–6 kurze Sätze. Pro Antwort nur EINE Situation und höchstens ein bis zwei neue Namen/Dinge. KEINE NUMMERIERTEN LISTEN (1., 2., 3.), keine Aufzählungspunkte (-, *, •), keine Optionen-Liste — alles als fließende Prosa. Keine Detailflut, kein Vorgriff auf mehrere Handlungsstränge. Schließe mit EINER konkreten, offenen Lage oder Frage, auf die der Spieler direkt reagieren kann. Ruhig und bildhaft, aber sparsam."

[voice_prompts]
# Static menu/system announcements are rendered ONCE via TTS and cached as
# audio -> playback without an API call (saves tokens + latency).
enabled             = true
allow_live_fallback = true   # if a cache entry is missing: render once live via TTS + cache it
voice               = ""     # empty = config.models.tts_voice; rebuild the cache on change

[cost]
# Rough cost estimate (USD per 1M tokens) — please adjust to current prices.
# When story.cost_cap_usd_per_session is exceeded, the narrator eases the
# story to a calm close.
enforce                 = true
usd_per_1m_input        = 0.30
usd_per_1m_output       = 1.20
usd_per_1m_embedding    = 0.02

[logging]
level = "INFO"          # DEBUG | INFO | WARNING | ERROR
file  = "data/storyteller.log"

[transcripts]
# Also write the exact prompt to the narrator LLM (system prompt + follow-up
# messages incl. tool rounds) into the transcript — expandable in the admin.
# Off by default: makes data/transcripts/*.jsonl considerably larger.
capture_prompts = false

[web]
host = "0.0.0.0"
port = 8080

[moderation]
# Player input is checked BEFORE the LLM reply (OpenAI Moderation API).
# Per-category thresholds are editable in the admin module (data/moderation.json).
enabled           = true
model             = "omni-moderation-latest"
default_threshold = 0.5

[netcheck]
# No Wi-Fi at boot -> own AP + captive portal (storyteller netcheck).
enabled     = true
iface       = "wlan0"
timeout_s   = 45
ap_ssid     = "storyteller-wifi"
ap_password = "storyteller"      # WPA2, >= 8 chars — please change
portal_host = "10.42.0.1"        # NM shared-mode gateway
web_port    = 80

[paths]
worlds_dir         = "data/worlds"
saves_dir          = "data/saves"
rag_db             = "data/rag.db"
wait_sounds_dir    = "data/wait_sounds"
voice_prompts_dir  = "data/voice_prompts"
