# Storyteller — zentrale Konfiguration. Alle Modellnamen sind hier änderbar.

[general]
locale = "de"        # de | en  (Sprache für Prompts/Menü/STT/TTS)

[runtime]
profile = "auto"     # auto | pi | pc
# auto: Linux + ReSpeaker erkannt => pi (ALSA softvol, LED-Ring),
#       sonst => pc (portables sounddevice-Backend, kein LED nötig).

[models]
story_llm        = "gpt-5.4"            # ERZÄHLER — hier lohnt ein starkes Modell
planner_llm      = "gpt-5.4"                        # Architekt + Zusammenfasser; leer => story_llm (billiger wählen, um story_llm hochstufen zu können)
gen_llm          = "gpt-5.4"                 # WELT-/INHALTS-GENERIERUNG (einmalig pro Welt/Vorschlag) — Default das große Modell; leer => story_llm
stt              = "gpt-4o-mini-transcribe"  # Spracherkennung (OpenAI)
tts              = "gpt-4o-mini-tts"         # Sprachausgabe (OpenAI; Whisper kann KEIN TTS)
tts_voice        = "ballad"
embedding        = "text-embedding-3-small"  # RAG-Embeddings
embedding_dim    = 512                       # Matryoshka-Trunkierung (kleiner = sparsamer)
llm_temperature     = 0.9   # Erzähler-Temperatur
planner_temperature = 0.6   # Architekt + Zusammenfasser
gen_temperature     = 0.8   # Welt-/Inhalts-Generierung
frequency_penalty = 0.0   # Anti-Wiederholung Erzähler; 0=aus, sanft 0.2–0.4 empfohlen
presence_penalty  = 0.0   # dito (Themen-Vielfalt); 0=aus

# Eigene OpenAI-kompatible Endpoints je Zweck (leer = OpenAI). base_url inkl.
# host:port und /v1, z.B. http://192.168.1.50:8000/v1 (vLLM/llama.cpp/Ollama/
# LM Studio). api_key wird als Bearer gesendet (lokale Server akzeptieren oft
# beliebig). Moderation nutzt immer den OpenAI-Default. Beispiel:
#   [models.story_endpoint]
#   base_url = "http://192.168.1.50:8000/v1"
#   api_key  = "sk-local"
# Weitere: planner_endpoint, gen_endpoint, stt_endpoint, tts_endpoint,
# embedding_endpoint — gleiche Form.

[stt]
provider = "openai"   # openai | local_whisper  (local => Phase 10, nur Pi 5 + AI HAT)
language = "de"

[capture]
# Sprachaufnahme endet bei einer Sprechpause statt nach fester Zeit —
# der Spieler darf so lange reden wie er will (bis max_seconds).
max_seconds     = 30.0   # harte Obergrenze (Kosten-/Endlos-Schutz)
silence_seconds = 1.2    # Pause, die den Zug beendet
start_timeout_s = 6.0    # gar nicht gesprochen -> Abbruch, neu fragen
min_seconds     = 0.5    # nie vor dieser Zeit beenden (1. Atemzug ignor.)

[tts]
provider    = "openai"  # openai | local  (local => Phase 10, nur Pi 5 + AI HAT)
format      = "pcm"     # 24 kHz mono s16le — ideal für Reverb
sample_rate = 24000

[audio]
backend            = "auto"                  # auto | alsa_softvol | portable | pipewire
output_alsa_pcm    = "plug:respeaker_softvol" # aplay/speaker-test Ziel (softvol => Lautstärke)
input_alsa_pcm     = "respeaker_capture"      # arecord Quelle (ReSpeaker, 16 kHz mono)
sd_output_device   = ""                       # sounddevice-Gerät; leer => ALSA default (~/.asoundrc => softvol)
mixer_card         = "ArrayUAC10"             # ALSA-Card-Name des ReSpeaker
mixer_control      = "Master"                 # softvol-Control
default_volume_pct = 15   # ReSpeaker Line-Out ist sehr "heiß"; bei Bedarf hoch (amixer -c ArrayUAC10 sset Master 25%)
input_sample_rate  = 16000
pw_sink            = ""   # Phase 8: PipeWire-Sink (leer = Default-Sink, z.B. Bluetooth)

[wakeword]
engine    = "openwakeword"
model     = ""        # eingebauter Name (z.B. "alexa") ODER Pfad zu eigener .onnx
model_de  = ""        # optional: eigenes Wake-Word für Locale de (Pfad/.onnx)
model_en  = ""        # optional: eigenes Wake-Word für Locale en
threshold = 0.5       # höher = weniger Fehlauslöser
follow_up = true      # nach dem Sprechen 1x ohne Wake-Word weiter zuhören

[fx]
enabled              = true
# Dezenter Hall (pedalboard Reverb). Pro Welt überschreibbar (world.fx_preset).
reverb_room_size     = 0.55
reverb_damping       = 0.55
reverb_wet_level     = 0.18
reverb_dry_level     = 0.85
distortion_drive_db  = 0.0   # 0 = aus; leichte Verzerrung ~4–8

[story]
short_term_memory_turns   = 12
rag_top_k                 = 4    # weniger Fakten -> weniger Detailflut
cost_cap_usd_per_session  = 2.0
max_substory_beats        = 5    # Länge des Mini-Spannungsbogens pro Substory
default_complexity        = "standard"  # simple|standard|rich (pro Welt überschreibbar)
dynamic_event_prob        = 0.15 # Wahrsch. pro Zug für eine abstrakte Story-Dynamik (subtil)
dynamics_in_planning      = true # Architekt darf (dezent) abstrakte Wendungen einplanen
long_term_memory          = true # Langzeitged.: aus dem Fenster fallende Züge in rollende Synopse verdichten
synopsis_max_chars        = 900  # Maximale Länge der Synopse (knapp halten)
synopsis_batch            = 8    # so viele alte Nachrichten auf einmal verdichten (selten => billig)
beat_nudge_after          = 3    # nach so vielen Zügen am selben Sub-Beat sanft an advance_beat erinnern (0=aus)
known_facts_cap           = 30   # Obergrenze Spieler-Fakten (ältester ohne Notiz wird verdrängt)
# Erzählstil-Leitlinie (frei editierbar): steuert Einfachheit/Länge.
narration_guidance = "Erzähle EINFACH und KLAR fürs Zuhören: höchstens 4–6 kurze Sätze. Pro Antwort nur EINE Situation und höchstens ein bis zwei neue Namen/Dinge. Keine Aufzählungen, keine Detailflut, kein Vorgriff auf mehrere Handlungsstränge. Schließe mit EINER konkreten, offenen Lage oder Frage, auf die der Spieler direkt reagieren kann. Ruhig und bildhaft, aber sparsam."

[voice_prompts]
# Statische Menü-/System-Ansagen werden EINMALIG via TTS gerendert und als
# Audio gecacht -> Abspielen ohne API-Aufruf (spart Tokens + Latenz).
enabled             = true
allow_live_fallback = true   # fehlt ein Cache-Eintrag: einmalig live via TTS + nachcachen
voice               = ""     # leer = config.models.tts_voice; Cache neu bauen bei Änderung

[cost]
# Grobe Kostenschätzung (USD pro 1 Mio. Tokens) — bitte an aktuelle Preise
# anpassen. Bei Überschreiten von story.cost_cap_usd_per_session leitet der
# Erzähler einen ruhigen Abschluss ein.
enforce                 = true
usd_per_1m_input        = 0.30
usd_per_1m_output       = 1.20
usd_per_1m_embedding    = 0.02

[logging]
level = "INFO"          # DEBUG | INFO | WARNING | ERROR
file  = "data/storyteller.log"

[transcripts]
# Auch den exakten Prompt ans Erzähler-LLM (System-Prompt + Folge-Nachrichten
# inkl. Tool-Runden) ins Transcript schreiben — im Admin ausklappbar sichtbar.
# Default aus: macht data/transcripts/*.jsonl deutlich größer.
capture_prompts = false

[web]
host = "0.0.0.0"
port = 8080

[moderation]
# Spieler-Eingabe wird VOR der LLM-Antwort geprüft (OpenAI Moderation API).
# Pro-Kategorie-Schwellen sind im Admin-Modul editierbar (data/moderation.json).
enabled           = true
model             = "omni-moderation-latest"
default_threshold = 0.5

[netcheck]
# Kein WLAN beim Boot -> eigener AP + Captive-Portal (storyteller netcheck).
enabled     = true
iface       = "wlan0"
timeout_s   = 45
ap_ssid     = "storyteller-wifi"
ap_password = "storyteller"      # WPA2, >= 8 Zeichen — bitte ändern
portal_host = "10.42.0.1"        # NM shared-mode Gateway
web_port    = 80

[paths]
worlds_dir         = "data/worlds"
saves_dir          = "data/saves"
rag_db             = "data/rag.db"
wait_sounds_dir    = "data/wait_sounds"
voice_prompts_dir  = "data/voice_prompts"
